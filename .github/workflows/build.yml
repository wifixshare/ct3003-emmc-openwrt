name: Build CT3003 eMMC firmware

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build.yml'
      - 'config/**'
      - 'dts/**'
      - 'files/**'

permissions:
  contents: write

concurrency:
  group: ct3003-emmc-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Check out builder files
        uses: actions/checkout@v4

      - name: Prepare build host
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            ccache gettext git libncurses5-dev libssl-dev python3-setuptools rsync \
            swig unzip zlib1g-dev file wget

      - name: Fetch ImmortalWrt source
        id: source
        run: |
          git clone --depth 1 --branch master \
            https://github.com/airjinkela/immortalwrt-main.git openwrt
          echo "revision=$(git -C openwrt rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # A toolchain is only restored from an identical upstream commit. This
      # prevents incompatible compiler/ABI files from being reused after a
      # source update, while making repeat builds of the same revision faster.
      - name: Restore cross-toolchain cache
        id: toolchain-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            openwrt/staging_dir/host
            openwrt/staging_dir/toolchain-aarch64_cortex-a53_gcc-*
          key: ${{ runner.os }}-ct3003-emmc-toolchain-${{ steps.source.outputs.revision }}

      - name: Restore download cache
        id: download-cache
        uses: actions/cache/restore@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-ct3003-emmc-downloads-${{ steps.source.outputs.revision }}
          restore-keys: |
            ${{ runner.os }}-ct3003-emmc-downloads-

      - name: Restore compiler cache
        id: ccache-cache
        uses: actions/cache/restore@v4
        with:
          path: openwrt/.ccache
          key: ${{ runner.os }}-ct3003-emmc-ccache-${{ steps.source.outputs.revision }}-${{ hashFiles('config/ct3003-emmc.config') }}
          restore-keys: |
            ${{ runner.os }}-ct3003-emmc-ccache-${{ steps.source.outputs.revision }}-

      - name: Add OpenClash and custom board files
        working-directory: openwrt
        run: |
          git clone --depth 1 https://github.com/vernesong/OpenClash.git package/openclash
          cp ../dts/mt7981b-cetron-ct3003-emmc.dts target/linux/mediatek/dts/
          cp -a ../files/. files/
          cp ../config/ct3003-emmc.config .config

      - name: Install feeds and download sources
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make download -j"$(nproc)"

      - name: Compile firmware
        working-directory: openwrt
        run: make -j"$(nproc)" V=s

      - name: Save cross-toolchain cache
        if: success() && steps.toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            openwrt/staging_dir/host
            openwrt/staging_dir/toolchain-aarch64_cortex-a53_gcc-*
          key: ${{ steps.toolchain-cache.outputs.cache-primary-key }}

      - name: Save download cache
        if: success() && steps.download-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: openwrt/dl
          key: ${{ steps.download-cache.outputs.cache-primary-key }}

      - name: Save compiler cache
        if: success() && steps.ccache-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: openwrt/.ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Collect firmware
        if: always()
        run: |
          mkdir -p release
          find openwrt/bin/targets/mediatek/filogic -maxdepth 1 -type f \
            \( -name '*ct3003-emmc*' -o -name 'sha256sums' \) \
            -exec cp {} release/ \; 2>/dev/null || true
          cp openwrt/.config release/build.config 2>/dev/null || true

      - name: Upload Action artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: CT3003-eMMC-firmware
          path: release/
          if-no-files-found: error
          retention-days: 30

      - name: Publish release
        if: success() && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ct3003-emmc-${{ github.run_number }}
          name: CT3003 eMMC build ${{ github.run_number }}
          body: |
            ImmortalWrt firmware for Cetron CT3003 eMMC.
            Default address: 192.168.2.1
            User: root (no password)
          files: release/*
