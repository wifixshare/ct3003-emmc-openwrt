name: Build CT3003 eMMC firmware

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build.yml'
      - 'config/**'
      - 'dts/**'
      - 'files/**'

permissions:
  contents: write

concurrency:
  group: ct3003-emmc-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Check out builder files
        uses: actions/checkout@v4

      - name: Prepare build host
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            ccache gettext git libncurses5-dev libssl-dev llvm python3-setuptools rsync \
            swig unzip zlib1g-dev file wget

      - name: Fetch ImmortalWrt source
        id: source
        run: |
          git clone --depth 1 --branch master \
            https://github.com/airjinkela/immortalwrt-main.git openwrt
          echo "revision=$(git -C openwrt rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # A toolchain is only restored for an identical upstream commit and
      # identical build configuration. CCACHE and other developer options
      # affect the host/toolchain wrappers, so reusing a cache across config
      # changes can leave binutils and GCC in an inconsistent state.
      - name: Restore cross-toolchain cache
        id: toolchain-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            openwrt/staging_dir/host
            openwrt/staging_dir/hostpkg
            openwrt/staging_dir/toolchain-aarch64_cortex-a53_gcc-*
          key: ${{ runner.os }}-ct3003-emmc-toolchain-${{ steps.source.outputs.revision }}-${{ hashFiles('config/ct3003-emmc.config') }}

      - name: Restore download cache
        id: download-cache
        uses: actions/cache/restore@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-ct3003-emmc-downloads-${{ steps.source.outputs.revision }}
          restore-keys: |
            ${{ runner.os }}-ct3003-emmc-downloads-

      - name: Restore compiler cache
        id: ccache-cache
        uses: actions/cache/restore@v4
        with:
          path: openwrt/.ccache
          key: ${{ runner.os }}-ct3003-emmc-ccache-${{ steps.source.outputs.revision }}-${{ hashFiles('config/ct3003-emmc.config') }}
          restore-keys: |
            ${{ runner.os }}-ct3003-emmc-ccache-${{ steps.source.outputs.revision }}-

      - name: Add OpenClash and custom board files
        working-directory: openwrt
        run: |
          git clone --depth 1 https://github.com/vernesong/OpenClash.git package/openclash
          # ImmortalWrt 24.10 ships Go 1.23. Pin PassWall2 and its package
          # recipes to a matching release set: current upstream cores require
          # Go 1.24-1.25 and cannot be built by this branch's toolchain.
          git init package/passwall-packages
          git -C package/passwall-packages remote add origin \
            https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git
          git -C package/passwall-packages fetch --depth 1 origin \
            1f765fd55ff40d49221df91990ebe3ef9a669a63
          git -C package/passwall-packages checkout --detach FETCH_HEAD
          # The geodata release referenced by the compatible package snapshot
          # was removed upstream. Use a current data-only recipe whose pinned
          # GeoIP/GeoSite assets are still available; this does not affect the
          # Go compatibility of sing-box or Xray.
          wget -qO package/passwall-packages/v2ray-geodata/Makefile \
            https://raw.githubusercontent.com/Openwrt-Passwall/openwrt-passwall-packages/eda14788fdeb07c6804d8bcf44d3eeec150930c1/v2ray-geodata/Makefile
          git init package/passwall2
          git -C package/passwall2 remote add origin \
            https://github.com/Openwrt-Passwall/openwrt-passwall2.git
          git -C package/passwall2 fetch --depth 1 origin \
            c8ed851e7a9f116c8743a6cfa95e25804237d3ec
          git -C package/passwall2 checkout --detach FETCH_HEAD
          cp ../dts/mt7981b-cetron-ct3003-emmc.dts target/linux/mediatek/dts/
          cp -a ../files/. files/
          # Embed a pinned ARM64 Mihomo core for OpenClash. The digest comes
          # from the corresponding upstream GitHub release asset.
          core_archive=dl/mihomo-linux-arm64-v1.19.28.gz
          core_sha256=2474450cd1c41dfa53036a54a4e85579f493d3af524d86c3d4b8e2b240b56cd2
          if [ ! -f "$core_archive" ] || \
             ! echo "$core_sha256  $core_archive" | sha256sum -c -; then
            wget -O "$core_archive" \
              https://github.com/MetaCubeX/mihomo/releases/download/v1.19.28/mihomo-linux-arm64-v1.19.28.gz
            echo "$core_sha256  $core_archive" | sha256sum -c -
          fi
          mkdir -p files/etc/openclash/core
          gzip -dc "$core_archive" > files/etc/openclash/core/clash_meta
          chmod 0755 files/etc/openclash/core/clash_meta

      - name: Install feeds and download sources
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # Feed installation regenerates package metadata and can discard
          # package selections that were loaded before feed packages existed.
          cp ../config/ct3003-emmc.config .config
          make defconfig
          # Fail immediately if the custom device selection was discarded.
          # Without this guard, Kconfig silently selects the first Filogic
          # profile and Actions can report success for the wrong router.
          grep -q '^CONFIG_TARGET_mediatek_filogic_DEVICE_cetron_ct3003-emmc=y$' .config
          # Keep compiler caching enabled even when Kconfig hides developer
          # options, and create the cache path before any compiler is invoked.
          grep -q '^CONFIG_CCACHE=y$' .config
          grep -q '^CONFIG_PACKAGE_luci-app-openclash=y$' .config
          grep -q '^CONFIG_PACKAGE_luci-app-samba4=y$' .config
          grep -q '^CONFIG_PACKAGE_luci-app-ddns=y$' .config
          grep -q '^CONFIG_PACKAGE_luci-proto-wireguard=y$' .config
          grep -q '^CONFIG_PACKAGE_luci-app-zerotier=y$' .config
          test -x files/etc/openclash/core/clash_meta
          mkdir -p .ccache
          make download -j"$(nproc)"

      - name: Build reusable cross-toolchain
        working-directory: openwrt
        run: |
          make tools/install -j"$(nproc)" || make tools/install -j1 V=s
          make toolchain/install -j"$(nproc)" || make toolchain/install -j1 V=s

      # Save the completed toolchain before compiling packages. Package build
      # failures must not discard the most expensive reusable build stage.
      - name: Save cross-toolchain cache
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            openwrt/staging_dir/host
            openwrt/staging_dir/hostpkg
            openwrt/staging_dir/toolchain-aarch64_cortex-a53_gcc-*
          key: ${{ steps.toolchain-cache.outputs.cache-primary-key }}

      - name: Compile firmware
        working-directory: openwrt
        run: make -j"$(nproc)" V=s

      - name: Save download cache
        if: ${{ always() && steps.download-cache.outcome == 'success' && steps.download-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: openwrt/dl
          key: ${{ steps.download-cache.outputs.cache-primary-key }}

      - name: Save compiler cache
        if: ${{ always() && steps.ccache-cache.outcome == 'success' && steps.ccache-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: openwrt/.ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Collect firmware
        if: success()
        run: |
          mkdir -p release
          find openwrt/bin/targets/mediatek/filogic -maxdepth 1 -type f \
            -name '*cetron_ct3003-emmc*' -exec cp {} release/ \;
          cp openwrt/.config release/build.config
          test -n "$(find release -maxdepth 1 -type f \
            -name '*ct3003-emmc*sysupgrade.bin' -print -quit)"
          (cd release && sha256sum * > SHA256SUMS)
          ls -lh release

      - name: Upload Action artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: CT3003-eMMC-firmware
          path: release/
          if-no-files-found: error
          retention-days: 30

      - name: Publish release
        if: success() && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ct3003-emmc-${{ github.run_number }}
          name: CT3003 eMMC build ${{ github.run_number }}
          body: |
            ImmortalWrt firmware for Cetron CT3003 eMMC.
            LuCI: HTTP only
            Default address: 192.168.6.1
            User: root (no password)
          files: release/*
